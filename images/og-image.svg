<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="og-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="og-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#og-bg)"/>
  
  <!-- Decorative circles -->
  <circle cx="900" cy="300" r="250" fill="#2563eb" opacity="0.05"/>
  <circle cx="1000" cy="400" r="180" fill="#7c3aed" opacity="0.04"/>
  <circle cx="200" cy="500" r="150" fill="#2563eb" opacity="0.03"/>
  
  <!-- Grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <rect width="40" height="40" fill="none"/>
    <rect width="1" height="1" x="20" y="20" fill="white" opacity="0.03"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Accent line top -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#og-accent)"/>
  
  <!-- Logo icon -->
  <rect x="80" y="80" width="56" height="56" rx="12" fill="url(#og-accent)"/>
  <text x="90" y="117" font-family="monospace" font-size="28" fill="white" font-weight="700">&lt;/&gt;</text>
  
  <!-- Title -->
  <text x="80" y="230" font-family="Arial, sans-serif" font-size="64" fill="white" font-weight="800">Learn With</text>
  <text x="80" y="310" font-family="Arial, sans-serif" font-size="64" fill="#60a5fa" font-weight="800">Abinash</text>
  
  <!-- Tagline -->
  <text x="80" y="380" font-family="Arial, sans-serif" font-size="24" fill="#94a3b8">Data Science | Power BI | Analytics Training</text>
  
  <!-- URL -->
  <text x="80" y="540" font-family="Arial, sans-serif" font-size="20" fill="#64748b">learnwithabinash.github.io/learnwithabinash</text>
  
  <!-- Feature badges -->
  <rect x="760" y="200" width="160" height="50" rx="25" fill="white" opacity="0.08"/>
  <text x="795" y="232" font-family="Arial, sans-serif" font-size="16" fill="#60a5fa" font-weight="600">🎓 500+ Students</text>
  
  <rect x="760" y="270" width="180" height="50" rx="25" fill="white" opacity="0.08"/>
  <text x="795" y="302" font-family="Arial, sans-serif" font-size="16" fill="#a78bfa" font-weight="600">📊 Power BI Expert</text>
  
  <rect x="760" y="340" width="200" height="50" rx="25" fill="white" opacity="0.08"/>
  <text x="795" y="372" font-family="Arial, sans-serif" font-size="16" fill="#34d399" font-weight="600">🏆 Practice Exams Free</text>
  
  <!-- Decorative dots -->
  <circle cx="1100" cy="100" r="4" fill="#2563eb" opacity="0.3"/>
  <circle cx="1050" cy="150" r="3" fill="#7c3aed" opacity="0.2"/>
  <circle cx="1120" cy="180" r="5" fill="#22c55e" opacity="0.15"/>
</svg>